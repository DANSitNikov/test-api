name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/pr-test.yml

  build:
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.build-push.outputs.image_sha }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: docker login -u ${{ vars.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build и push image with two tags
        id: build-push
        env:
          IMAGE_SHA: ${{ vars.DOCKER_USER }}/test-api:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ vars.DOCKER_USER }}/test-api:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image_sha=$IMAGE_SHA" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            
            # Берём имя образа из output предыдущего job'а — не дублируем
            sed -i "s|DOCKER_IMAGE=.*|DOCKER_IMAGE=${{ needs.build.outputs.image_sha }}|" .env

            docker compose up -d --no-deps backend